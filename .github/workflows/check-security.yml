name: Security Scan

on:
  pull_request:
    branches: [ "main" ]

permissions:
  security-events: read
  contents: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for Dependabot Alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # This command asks GitHub: "Are there any open alerts for this repo?"
          ALERTS=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open)
          
          # Check if the list of alerts is empty ([])
          if [ "$ALERTS" != "[]" ]; then
            echo "❌ SECURITY ALERT: Open vulnerabilities found in dependencies!"
            echo "$ALERTS" | jq '.[].security_advisory.summary'
            exit 1
          else
            echo "✅ No open Dependabot alerts found."
          fi
