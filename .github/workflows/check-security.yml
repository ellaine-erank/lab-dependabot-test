name: Security Scan

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    # SMART RULE: If the PR is opened by Dependabot, skip this check.
    # This prevents the "Fix" from being blocked by the "Vulnerability."
    if: github.actor != 'dependabot[bot]'
    
    steps:
      - name: Scan for Dependabot Alerts
        env:
          # Use your Master Key (PAT) with 'repo', 'security_events', and 'workflow' scopes
          GH_TOKEN: ${{ secrets.SECURITY_GATE_TOKEN }}
        run: |
          # The 'gh' tool uses your token to check the Security API
          ALERTS=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open)
          
          if [ "$ALERTS" != "[]" ]; then
            echo "❌ SECURITY ALERT: Open vulnerabilities found in dependencies!"
            # This lists the specific problems found
            echo "$ALERTS" | jq -r '.[].security_advisory.summary' | sed 's/^/- /'
            exit 1
          else
            echo "✅ No open Dependabot alerts found. Safe to merge!"
          fi
