name: Security Scan

on:
  pull_request:
    branches: [ "main" ]

permissions:
  security-events: read
  contents: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for Dependabot Alerts
        env:
          # This pulls the token from the "Vault" you just created
          GH_TOKEN: ${{ secrets.SECURITY_GATE_TOKEN }}
        run: |
          ALERTS=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open)
          
          if [ "$ALERTS" != "[]" ]; then
            echo "❌ SECURITY ALERT: Open vulnerabilities found!"
            echo "$ALERTS" | jq -r '.[].security_advisory.summary' | sed 's/^/- /'
            exit 1
          else
            echo "✅ No open Dependabot alerts found."
          fi
