name: Security Scan

on:
  pull_request:
    branches: [ "main" ]

# ADD THIS SECTION TO FIX THE 403 ERROR
permissions:
  contents: read
  security-events: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Scan for Dependabot Alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The 'gh' tool now has the "ID Card" to see this resource
          ALERTS=$(gh api repos/${{ github.repository }}/dependabot/alerts?state=open)
          
          if [ "$ALERTS" != "[]" ]; then
            echo "❌ SECURITY ALERT: Open vulnerabilities found!"
            exit 1
          else
            echo "✅ No open Dependabot alerts found."
          fi
