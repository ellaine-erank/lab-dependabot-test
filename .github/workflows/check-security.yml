name: Security Scan

on:
  pull_request:
    branches: [ "main" ]

permissions:
  security-events: read
  contents: read

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Dependabot Alerts
        # Using a verified alternative that is currently reachable
        uses: spicyparrot/check-dependabot-alerts@v1.4.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
